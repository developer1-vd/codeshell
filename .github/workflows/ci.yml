name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up permissions for tests
        run: |
          chmod +x tests/test_os_detection.sh || true
        shell: bash

      - name: Run OS detection test
        run: |
          bash tests/test_os_detection.sh
        shell: bash
